<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ทายผลเลขท้าย 2 ตัวล่าง (Elderly Friendly)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;700&family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #2e7d32; /* เขียวเข้มอ่านง่าย */
            --taken-color: #c62828;   /* แดงเข้มชัดเจน */
            --bg-color: #f8fafc;
            --text-main: #1e293b;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Sarabun', sans-serif;
            background-color: var(--bg-color);
            text-align: center;
            margin: 0;
            padding: 20px;
            color: var(--text-main);
        }

        header {
            background-color: #ffffff;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        h1 {
            font-family: 'Prompt', sans-serif;
            font-size: 2.2rem;
            margin: 0 0 15px 0;
            color: #0f172a;
        }

        .countdown-container {
            font-size: 1.5rem;
            color: #d32f2f;
            font-weight: bold;
            padding: 15px;
            background-color: #ffebee;
            border-radius: 12px;
            display: inline-block;
            border: 2px solid #ffcdd2;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 ช่องต่อแถวสำหรับมือถือ */
            gap: 12px;
            max-width: 900px;
            margin: 0 auto;
            padding: 10px;
        }

        .number-box {
            background-color: var(--primary-color);
            color: white;
            padding: 25px 5px;
            font-size: 1.8rem; /* ตัวเลขใหญ่มาก */
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 4px 0 #1b5e20;
            transition: all 0.1s;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100px;
        }

        .number-box:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 transparent;
        }

        .number-box.taken {
            background-color: var(--taken-color);
            box-shadow: 0 4px 0 #b71c1c;
            cursor: not-allowed;
        }

        .name-label {
            font-size: 1rem;
            font-weight: normal;
            margin-top: 8px;
            background: rgba(0,0,0,0.2);
            padding: 2px 8px;
            border-radius: 5px;
            width: 90%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* ปุ่ม Admin Reset */
        .admin-zone {
            margin-top: 50px;
            padding: 30px;
            border-top: 2px dashed #cbd5e1;
        }

        .reset-btn {
            background-color: #475569;
            color: white;
            border: none;
            padding: 20px 40px;
            font-size: 1.5rem;
            font-family: 'Prompt', sans-serif;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 4px 0 #334155;
        }

        .reset-btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        /* Desktop View */
        @media (min-width: 800px) {
            .grid-container {
                grid-template-columns: repeat(10, 1fr);
            }
            h1 { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <header>
        <h1>เลขท้าย สองตัว ล่าง<br>งวดวันที่ 16 มิถุนายน 2569</h1>
        <div class="countdown-container">
            ปิดรับทายผลใน: <br><span id="timer">...</span>
        </div>
    </header>

    <div class="grid-container" id="grid">
        </div>

    <div class="admin-zone">
        <button class="reset-btn" id="resetBtn">ล้างข้อมูลทั้งหมด (เริ่มงวดใหม่)</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, get, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBvXRATBf2x1Lq_JToL2rlQYOh8mK65tIU",
            authDomain: "suchartstudio-9a78d.firebaseapp.com",
            databaseURL: "https://suchartstudio-9a78d-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "suchartstudio-9a78d",
            storageBucket: "suchartstudio-9a78d.firebasestorage.app",
            messagingSenderId: "953369646185",
            appId: "1:953369646185:web:121f9e5920e3df006ebef8",
            measurementId: "G-T1SGHLYCS5"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // นัดหมายเวลา (ตัวอย่าง)
        const drawDate = new Date("June 16, 2026 15:30:00").getTime();

        setInterval(() => {
            const now = new Date().getTime();
            const distance = drawDate - now;
            if (distance < 0) {
                document.getElementById("timer").innerHTML = "หมดเวลาแล้ว";
                return;
            }
            const d = Math.floor(distance / (86400000));
            const h = Math.floor((distance % 86400000) / 3600000);
            const m = Math.floor((distance % 3600000) / 60000);
            const s = Math.floor((distance % 60000) / 1000);
            document.getElementById("timer").innerHTML = `${d}วัน ${h}ชม. ${m}นาที ${s}วินาที`;
        }, 1000);

        // สร้างตาราง
        const grid = document.getElementById("grid");
        for (let i = 0; i < 100; i++) {
            let num = i.toString().padStart(2, '0');
            let box = document.createElement("div");
            box.className = "number-box";
            box.id = "box-" + num;
            box.innerHTML = `<span>${num}</span>`;
            
            box.onclick = async () => {
                if(new Date().getTime() > drawDate) return alert("หมดเวลาแล้วจ้า!");
                
                const snap = await get(ref(db, 'reservations/' + num));
                if (snap.exists()) return alert("เลขนี้มีคนจองแล้วครับ");

                let name = prompt("กรุณาใส่ชื่อของคุณเพื่อจองเลข " + num + ":");
                if (name && name.trim()) {
                    set(ref(db, 'reservations/' + num), name.trim());
                }
            };
            grid.appendChild(box);
        }

        // ดึงข้อมูล Realtime
        onValue(ref(db, 'reservations'), (snapshot) => {
            const data = snapshot.val() || {};
            for(let i = 0; i < 100; i++) {
                let num = i.toString().padStart(2, '0');
                let box = document.getElementById("box-" + num);
                if (data[num]) {
                    box.className = "number-box taken";
                    box.innerHTML = `${num}<div class="name-label">${data[num]}</div>`;
                } else {
                    box.className = "number-box";
                    box.innerHTML = `<span>${num}</span>`;
                }
            }
        });

        // ระบบ Reset
        document.getElementById("resetBtn").onclick = () => {
            const confirmReset = confirm("คุณแน่ใจหรือไม่ว่าต้องการล้างข้อมูลทั้งหมดเพื่อเริ่มงวดใหม่?");
            if (confirmReset) {
                const password = prompt("กรุณาใส่รหัสผ่านเพื่อยืนยันการล้างข้อมูล:");
                if (password === "987654321") {
                    remove(ref(db, 'reservations'))
                    .then(() => alert("ล้างข้อมูลเรียบร้อยแล้ว! ทุกช่องพร้อมให้จองใหม่"))
                    .catch(err => alert("เกิดข้อผิดพลาด: " + err.message));
                } else if (password !== null) {
                    alert("รหัสผ่านไม่ถูกต้อง! ไม่สามารถล้างข้อมูลได้");
                }
            }
        };
    </script>
</body>
</html>
